---
# Ansible Inventory Example
# Copy to hosts.yml and fill in your values
#
# Usage:
#   cp hosts.example.yml hosts.yml
#   # Edit hosts.yml with your server details
#   ansible-playbook -i inventory/hosts.yml playbooks/install-k3s.yml

all:
  children:
    vps:
      hosts:
        dex-server:
          ansible_host: 203.0.113.10        # Replace with your VPS IP
          ansible_user: root                  # Replace with your SSH user
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_python_interpreter: /usr/bin/python3

  vars:
    ansible_connection: ssh
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
