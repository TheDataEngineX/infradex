prometheus:
  enabled: true
  server:
    retention: 15d
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

grafana:
  enabled: true
  adminPassword: "" # Set via --set or secret
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server:9090
      isDefault: true
    - name: Loki
      type: loki
      url: http://loki:3100
    - name: Jaeger
      type: jaeger
      url: http://jaeger-query:16686

loki:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

jaeger:
  enabled: true
  collector:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  query:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
