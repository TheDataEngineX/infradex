# Langfuse LLM observability — TheDataEngineX platform
# Docs: https://langfuse.com/docs/deployment/self-host

langfuse:
  # Auth
  nextauth_secret: "${LANGFUSE_NEXTAUTH_SECRET}"
  salt: "${LANGFUSE_SALT}"

  # Database (shared PostgreSQL instance)
  database_url: "postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@postgres:5432/langfuse"

  # Feature flags
  telemetry_enabled: false
  langfuse_enable_experimental_features: false

  # Sign-up (disable for self-hosted production — manage users via admin)
  auth_disable_signup: true

web:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: traces.thedataenginex.org
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: langfuse-tls
        hosts:
          - traces.thedataenginex.org

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Redis (shared instance)
redis:
  deploy: false               # use existing Redis
  host: redis
  port: 6379
