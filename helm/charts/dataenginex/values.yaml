replicaCount: 1

image:
  repository: ghcr.io/thedataenginex/dataenginex
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 17000

ingress:
  enabled: true
  host: api.thedataenginex.org
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DATABASE_URL: "postgresql://dex:dex@postgres:5432/dex"
  REDIS_URL: "redis://redis:6379"

healthCheck:
  path: /health
  port: 17000
