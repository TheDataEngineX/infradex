replicaCount: 1

image:
  repository: ghcr.io/thedataenginex/agentdex
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8002

containerPort: 8002

env:
  - name: DEX_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"

healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
