# AlertManager Configuration
# Routes alerts to notification channels

global:
  resolve_timeout: 5m

route:
  group_by:
    - alertname
    - service
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical-alerts
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    # TODO: Configure email or Slack notifications
    # email_configs:
    #   - to: alerts@dataenginex.dev
    #     from: alertmanager@dataenginex.dev
    #     smarthost: smtp.example.com:587
    #     auth_username: alertmanager@dataenginex.dev
    #     auth_password: ""  # Use secret reference
    #     require_tls: true

  - name: critical-alerts
    # TODO: Configure PagerDuty or urgent notification channel
    # pagerduty_configs:
    #   - service_key: ""  # Use secret reference

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - service
