name: Notify Docs

on:
  push:
    branches: [main]
    paths: ['docs/**', 'src/**/**.py']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: TheDataEngineX/docs
          event-type: docs-update
          client-payload: >-
            {"repo": "${{ github.repository }}", "ref": "${{ github.sha }}"}
