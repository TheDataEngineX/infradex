name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run poe lint
      - run: uv run poe typecheck
      - run: uv run pytest tests/ -x --tb=short -q --cov=infradex --cov-report=xml
      - uses: codecov/codecov-action@v6
        with:
          flags: infradex
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  terraform:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

  helm:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Lint all charts
        run: |
          for chart in helm/charts/*/; do
            echo "Linting $chart"
            helm lint "$chart"
          done
