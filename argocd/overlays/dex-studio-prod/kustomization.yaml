apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dex-studio

resources:
- ../../base-dex-studio

images:
- name: ghcr.io/thedataenginex/dex-studio
  newName: ghcr.io/thedataenginex/dex-studio
  newTag: sha-953d68c0


patches:
- patch: |
    - op: replace
      path: /spec/replicas
      value: 3
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 500m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "1"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 2Gi
  target:
    kind: Deployment
    name: dex-studio
- patch: |
    - op: add
      path: /metadata/annotations
      value:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.tls: "true"
    - op: add
      path: /spec/tls
      value:
        - hosts:
            - dex-studio.thedataenginex.org
          secretName: dex-studio-tls
  target:
    kind: Ingress
    name: dex-studio

commonLabels:
  environment: prod
