apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dex-studio-stage

resources:
- ../../base-dex-studio

images:
- name: ghcr.io/thedataenginex/dex-studio
  newName: ghcr.io/thedataenginex/dex-studio

patches:
- patch: |
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: dex-studio

commonLabels:
  environment: stage
