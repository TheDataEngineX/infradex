apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dex-studio-stage

resources:
- ../../base-dex-studio

images:
- name: ghcr.io/thedataenginex/dex-studio
  newName: ghcr.io/thedataenginex/dex-studio
  newTag: sha-953d68c0

patches:
- patch: |
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: dex-studio
- patch: |
    - op: replace
      path: /spec/rules/0/host
      value: stage.dex-studio.thedataenginex.org
  target:
    kind: Ingress
    name: dex-studio

commonLabels:
  environment: stage
