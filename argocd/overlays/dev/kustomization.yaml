apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dex-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: dex-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/thedataenginex/dataenginex:dev

commonLabels:
  environment: dev
