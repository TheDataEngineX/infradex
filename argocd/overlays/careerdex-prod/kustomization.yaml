apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careerdex

resources:
- ../../base-careerdex

images:
- name: ghcr.io/thedataenginex/careerdex
  newName: ghcr.io/thedataenginex/careerdex
  newTag: sha-fd40d725

patches:
- patch: |
    - op: replace
      path: /spec/replicas
      value: 3
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 500m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "1"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 2Gi
  target:
    kind: Deployment
    name: careerdex

commonLabels:
  environment: prod
