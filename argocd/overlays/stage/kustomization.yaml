apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dex-stage

resources:
  - ../../base

images:
  - name: ghcr.io/thedataenginex/dataenginex
    newTag: sha-00000000

patches:
  - target:
      kind: Deployment
      name: dex-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

commonLabels:
  environment: stage
