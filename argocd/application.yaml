# ---------------------------------------------------------------
# ArgoCD ApplicationSet — Branch-based deployment
# Three long-lived branches map to one environment each:
#   dev   branch → dex-dev   (development)
#   stage branch → dex-stage (stage)
#   main  branch → dex       (production)
# Overlays live in infradex repo at argocd/overlays/<env>/
# Image tags are pinned per-overlay and updated by CI/CD workflows
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dex-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: dex-dev
            namespace: dex-dev
            environment: dev
            branch: dev
          - name: dex-stage
            namespace: dex-stage
            environment: stage
            branch: stage
          - name: dex-prod
            namespace: dex
            environment: prod
            branch: main
  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: dex-project
      source:
        repoURL: https://github.com/TheDataEngineX/infradex
        targetRevision: "{{branch}}"
        path: "argocd/overlays/{{environment}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dex-project
  namespace: argocd
spec:
  description: DEX - DataEngineX Project

  sourceRepos:
    - 'https://github.com/TheDataEngineX/infradex'

  destinations:
    - namespace: 'dex'
      server: https://kubernetes.default.svc
    - namespace: 'dex-dev'
      server: https://kubernetes.default.svc
    - namespace: 'dex-stage'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
