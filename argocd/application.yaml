# ---------------------------------------------------------------
# ArgoCD ApplicationSet — Permanent environments (stage + prod)
# All overlays live on the infradex `main` branch.
# Image tags are pinned per-overlay and updated by CI/CD workflows.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dex-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          # dex-studio — Reflex UI application
          - name: dex-studio-stage
            namespace: dex-studio-stage
            overlay: dex-studio-stage
          - name: dex-studio-prod
            namespace: dex-studio
            overlay: dex-studio-prod

          # careerdex — AI career intelligence application
          - name: careerdex-stage
            namespace: careerdex-stage
            overlay: careerdex-stage
          - name: careerdex-prod
            namespace: careerdex
            overlay: careerdex-prod

  template:
    metadata:
      name: "{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: dex-project
      source:
        repoURL: https://github.com/TheDataEngineX/infradex
        targetRevision: main
        path: "argocd/overlays/{{overlay}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

---
# ---------------------------------------------------------------
# ArgoCD ApplicationSet — Ephemeral preview environments
# Discovers argocd/previews/<service>/<branch-slug>/ directories
# on infradex main. CI creates/deletes these dirs on feature
# branch push/delete. ArgoCD auto-prunes when dirs are removed.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dex-previews
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/TheDataEngineX/infradex
        revision: main
        directories:
          - path: argocd/previews/*/*

  template:
    metadata:
      # path[2] = service (e.g. dex-studio), path[3] = branch-slug
      name: "{{path[2]}}-preview-{{path[3]}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: dex-project
      source:
        repoURL: https://github.com/TheDataEngineX/infradex
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path[2]}}-preview-{{path[3]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dex-project
  namespace: argocd
spec:
  description: DEX - DataEngineX Platform

  sourceRepos:
    - 'https://github.com/TheDataEngineX/infradex'

  destinations:
    - namespace: 'dex-studio'
      server: https://kubernetes.default.svc
    - namespace: 'dex-studio-stage'
      server: https://kubernetes.default.svc
    - namespace: 'dex-studio-preview-*'
      server: https://kubernetes.default.svc
    - namespace: 'careerdex'
      server: https://kubernetes.default.svc
    - namespace: 'careerdex-stage'
      server: https://kubernetes.default.svc
    - namespace: 'careerdex-preview-*'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
