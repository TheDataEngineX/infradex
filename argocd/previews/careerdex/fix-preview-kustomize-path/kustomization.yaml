apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: careerdex-preview-fix-preview-kustomize-path
resources:
- ../../../base-careerdex
images:
- name: ghcr.io/thedataenginex/careerdex
  newName: ghcr.io/thedataenginex/careerdex
  newTag: sha-3bbb3096
patches:
- patch: |
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 100m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 256Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 250m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 512Mi
  target:
    kind: Deployment
    name: careerdex
commonLabels:
  environment: preview
