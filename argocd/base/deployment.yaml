apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-app
  labels:
    app: dex-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex-app
  template:
    metadata:
      labels:
        app: dex-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dex-app
          image: ghcr.io/thedataenginex/dataenginex:sha-00000000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 17000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 17000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 17000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 17000
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: dex-config
                optional: true
            - secretRef:
                name: dex-secrets
                optional: true
